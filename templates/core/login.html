{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión — SIA3002C</title>
  <link rel="stylesheet" href="{% static 'css/sia.css' %}">
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--bg-primary); }
    .login-wrapper { width: 100%; max-width: 420px; padding: 20px; }
    .login-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 40px; }
    .login-logo { text-align: center; margin-bottom: 32px; }
    .login-logo .logo-big { font-size: 48px; display: block; margin-bottom: 12px; }
    .login-logo h1 { font-size: 22px; font-weight: 800; color: var(--text-primary); }
    .login-logo p { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }
    .form-group { margin-bottom: 18px; }
    .form-group input { width: 100%; padding: 11px 14px; background: var(--bg-primary); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text-primary); font-size: 14px; font-family: inherit; transition: all 0.2s; }
    .form-group input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(88,166,255,0.15); }
    .btn-login { width: 100%; padding: 12px; background: var(--accent); color: #0d1117; border: none; border-radius: var(--radius); font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.2s; font-family: inherit; }
    .btn-login:hover { background: var(--accent-hover); transform: translateY(-1px); }
    .login-footer { text-align: center; margin-top: 20px; font-size: 11px; color: var(--text-muted); }
    .error-msg { background: var(--red-bg); border: 1px solid var(--red-border); color: var(--red); padding: 10px 14px; border-radius: var(--radius); font-size: 12px; margin-bottom: 16px; }
    .input-label { display: block; font-size: 11px; font-weight: 600; color: var(--text-secondary); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
  </style>
</head>
<body>
  <div class="login-wrapper">
    <div class="login-card">
      <div class="login-logo">
        <span class="logo-big">🎯</span>
        <h1>SIA3002C</h1>
        <p>Sistema de Predicción de Deserción Escolar con IA</p>
      </div>

      {% if form.errors %}
      <div class="error-msg">❌ Usuario o contraseña incorrectos. Inténtalo de nuevo.</div>
      {% endif %}

      <form method="post">
        {% csrf_token %}
        <div class="form-group">
          <label class="input-label" for="id_username">Usuario</label>
          <input type="text" name="username" id="id_username" placeholder="Nombre de usuario" autocomplete="username" required>
        </div>
        <div class="form-group">
          <label class="input-label" for="id_password">Contraseña</label>
          <input type="password" name="password" id="id_password" placeholder="Contraseña" autocomplete="current-password" required>
        </div>
        <input type="hidden" name="next" value="{{ next }}">
        <button type="submit" class="btn-login">🔑 Iniciar Sesión</button>
      </form>

      <div class="login-footer">
        Equipo 3002C_SIIA · UNIR Maestría en IA<br>
        Proyecto académico de demostración
      </div>
    </div>
  </div>
</body>
</html>
